spring:
  application:
    name: ai-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  datasource:
    url: ${NEON_DB_URL:jdbc:postgresql://localhost:5432/ai_service?sslmode=${NEON_DB_SSL_MODE:prefer}}
    username: ${NEON_DB_USER:marketplace}
    password: ${NEON_DB_PASSWORD:marketplace}
    hikari:
      maximum-pool-size: ${NEON_DB_POOL_MAX:10}
      minimum-idle: ${NEON_DB_POOL_MIN:2}
      pool-name: ai-service-pool
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/marketplace}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/marketplace/protocol/openid-connect/certs}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3000ms}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:ai-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${AI_SERVICE_PORT:8091}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-},%X{requestId:-}]"
  level:
    root: INFO
    com.enterprise.marketplace: INFO

marketplace:
  service:
    name: ai-service
  api:
    version: v1
  security:
    enabled: ${MARKETPLACE_SECURITY_ENABLED:true}
  redis:
    enabled: ${REDIS_ENABLED:true}
    prompt-cache-ttl-seconds: ${AI_PROMPT_CACHE_TTL_SECONDS:3600}
    session-cache-ttl-seconds: ${AI_SESSION_CACHE_TTL_SECONDS:1800}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    consumer-group: ${KAFKA_CONSUMER_GROUP:ai-service}
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    publish-interval-ms: ${OUTBOX_PUBLISH_INTERVAL_MS:5000}
    max-retries: ${OUTBOX_MAX_RETRIES:5}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    default-model: ${OLLAMA_DEFAULT_MODEL:llama3.2}
    timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:60}
    enabled: ${OLLAMA_ENABLED:true}
  ai:
    feature-enabled: ${AI_FEATURE_ENABLED:true}
    max-chat-history: ${AI_MAX_CHAT_HISTORY:20}
    rate-limit-per-hour: ${AI_RATE_LIMIT_PER_HOUR:100}

keycloak:
  realm: ${KEYCLOAK_REALM:marketplace}
