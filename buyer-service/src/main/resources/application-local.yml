spring:
  datasource:
    url: ${NEON_DB_URL:jdbc:postgresql://localhost:5432/buyer_service?sslmode=prefer}
    username: ${NEON_DB_USER:marketplace}
    password: ${NEON_DB_PASSWORD:marketplace}
  jpa:
    show-sql: true

springdoc:
  swagger-ui:
    enabled: true

marketplace:
  security:
    enabled: ${MARKETPLACE_SECURITY_ENABLED:false}

logging:
  level:
    com.enterprise.marketplace: DEBUG

management:
  endpoint:
    health:
      show-details: always
