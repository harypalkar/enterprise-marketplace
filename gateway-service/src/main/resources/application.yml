spring:
  application:
    name: gateway-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/marketplace}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/marketplace/protocol/openid-connect/certs}
  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=Cookie
      routes:
        - id: identity-service
          uri: http://${IDENTITY_SERVICE_HOST:localhost}:${IDENTITY_SERVICE_PORT:8081}
          predicates:
            - Path=/api/identity/**
          filters:
            - StripPrefix=2
        - id: search-service
          uri: http://${SEARCH_SERVICE_HOST:localhost}:${SEARCH_SERVICE_PORT:8090}
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=2
        - id: product-service
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:${PRODUCT_SERVICE_PORT:8082}
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=2
        - id: seller-service
          uri: http://${SELLER_SERVICE_HOST:localhost}:${SELLER_SERVICE_PORT:8083}
          predicates:
            - Path=/api/sellers/**
          filters:
            - StripPrefix=2
        - id: buyer-service
          uri: http://${BUYER_SERVICE_HOST:localhost}:${BUYER_SERVICE_PORT:8084}
          predicates:
            - Path=/api/buyers/**
          filters:
            - StripPrefix=2
        - id: category-service
          uri: http://${CATEGORY_SERVICE_HOST:localhost}:${CATEGORY_SERVICE_PORT:8085}
          predicates:
            - Path=/api/categories/**
          filters:
            - StripPrefix=2
        - id: inventory-service
          uri: http://${INVENTORY_SERVICE_HOST:localhost}:${INVENTORY_SERVICE_PORT:8086}
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=2
        - id: pricing-service
          uri: http://${PRICING_SERVICE_HOST:localhost}:${PRICING_SERVICE_PORT:8087}
          predicates:
            - Path=/api/pricing/**
          filters:
            - StripPrefix=2
        - id: ai-service
          uri: http://${AI_SERVICE_HOST:localhost}:${AI_SERVICE_PORT:8091}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=2
  flyway:
    enabled: false

server:
  port: ${GATEWAY_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,ping
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-},%X{requestId:-}]"
  level:
    root: INFO
    com.enterprise.marketplace: INFO
    org.springframework.cloud.gateway: INFO

marketplace:
  service:
    name: gateway-service
  api:
    version: v1
  security:
    enabled: ${MARKETPLACE_SECURITY_ENABLED:true}

keycloak:
  realm: ${KEYCLOAK_REALM:marketplace}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}
  client-id: ${KEYCLOAK_CLIENT_ID:marketplace-gateway}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:marketplace-gateway-secret}
