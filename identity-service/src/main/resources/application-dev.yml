spring:
  datasource:
    url: ${NEON_DB_URL}
    username: ${NEON_DB_USER}
    password: ${NEON_DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

marketplace:
  security:
    enabled: true

logging:
  level:
    com.enterprise.marketplace: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,ping,redis,kafka
