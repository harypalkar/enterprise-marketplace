spring:
  datasource:
    url: ${NEON_DB_URL:jdbc:postgresql://localhost:5432/identity_service?sslmode=prefer}
    username: ${NEON_DB_USER:marketplace}
    password: ${NEON_DB_PASSWORD:marketplace}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  jpa:
    show-sql: true

springdoc:
  swagger-ui:
    enabled: true

marketplace:
  security:
    enabled: ${MARKETPLACE_SECURITY_ENABLED:false}

logging:
  level:
    com.enterprise.marketplace: DEBUG

management:
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include: readinessState,ping,redis,kafka
