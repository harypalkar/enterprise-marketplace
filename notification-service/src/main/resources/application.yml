spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  datasource:
    url: ${NEON_DB_URL:jdbc:postgresql://localhost:5432/notification_service?sslmode=${NEON_DB_SSL_MODE:prefer}}
    username: ${NEON_DB_USER:marketplace}
    password: ${NEON_DB_PASSWORD:marketplace}
    hikari:
      maximum-pool-size: ${NEON_DB_POOL_MAX:10}
      minimum-idle: ${NEON_DB_POOL_MIN:2}
      pool-name: notification-service-pool
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        ssl: ${NEON_DB_SSL:true}
        sslmode: ${NEON_DB_SSL_MODE:prefer}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/marketplace}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/marketplace/protocol/openid-connect/certs}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3000ms}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

server:
  port: ${NOTIFICATION_SERVICE_PORT:8089}
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-},%X{requestId:-}]"
  level:
    root: INFO
    com.enterprise.marketplace: INFO

marketplace:
  service:
    name: notification-service
  api:
    version: v1
  security:
    enabled: ${MARKETPLACE_SECURITY_ENABLED:true}
  redis:
    enabled: ${REDIS_ENABLED:true}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout-ms: ${REDIS_TIMEOUT_MS:3000}
    template-cache-ttl-seconds: ${NOTIFICATION_TEMPLATE_CACHE_TTL_SECONDS:3600}
    channel-cache-ttl-seconds: ${NOTIFICATION_CHANNEL_CACHE_TTL_SECONDS:3600}
    preference-cache-ttl-seconds: ${NOTIFICATION_PREFERENCE_CACHE_TTL_SECONDS:86400}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer-group: ${KAFKA_CONSUMER_GROUP:notification-service}
  outbox:
    enabled: ${OUTBOX_ENABLED:true}
    publish-interval-ms: ${OUTBOX_PUBLISH_INTERVAL_MS:5000}
    max-retries: ${OUTBOX_MAX_RETRIES:5}
  notification:
    dispatch-interval-ms: ${NOTIFICATION_DISPATCH_INTERVAL_MS:3000}
    expiry-interval-ms: ${NOTIFICATION_EXPIRY_INTERVAL_MS:60000}
    max-delivery-retries: ${NOTIFICATION_MAX_DELIVERY_RETRIES:3}
    expiry-hours: ${NOTIFICATION_EXPIRY_HOURS:72}
    default-from-email: ${NOTIFICATION_FROM_EMAIL:noreply@marketplace.local}
    email-provider: ${NOTIFICATION_EMAIL_PROVIDER:SMTP}
    aws-region: ${AWS_REGION:ap-south-1}
    sms-gateway-url: ${SMS_GATEWAY_URL:}
    push-gateway-url: ${PUSH_GATEWAY_URL:}
    webhook-timeout-ms: ${WEBHOOK_TIMEOUT_MS:5000}
    twilio-enabled: ${TWILIO_ENABLED:false}
    twilio-account-sid: ${TWILIO_ACCOUNT_SID:}
    twilio-auth-token: ${TWILIO_AUTH_TOKEN:}
    twilio-from-number: ${TWILIO_FROM_NUMBER:}
    fcm-enabled: ${FCM_ENABLED:false}
    fcm-service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:}

keycloak:
  realm: ${KEYCLOAK_REALM:marketplace}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}
  client-id: ${KEYCLOAK_CLIENT_ID:marketplace-services}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:marketplace-services-secret}
