spring:
  datasource:
    url: jdbc:h2:mem:search_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

marketplace:
  security:
    enabled: false
  redis:
    enabled: false
  kafka:
    enabled: false
  outbox:
    enabled: false
