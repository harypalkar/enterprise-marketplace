# Standalone profile — in-memory H2 when PostgreSQL/Docker is unavailable (local smoke tests only).
spring:
  datasource:
    url: jdbc:h2:mem:workflow_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

marketplace:
  security:
    enabled: false
  redis:
    enabled: false
  kafka:
    enabled: false
  outbox:
    enabled: false
